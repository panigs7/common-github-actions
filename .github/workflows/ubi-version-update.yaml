jobs:
  update-sha:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      id: check-skopeo
      run: |
        if ! command -v skopeo &> /dev/null; then
          echo "Skopeo not found, installing..."
          sudo apt-get update
          sudo apt-get install -y skopeo
        else
          echo "Skopeo is already installed"
        fi
        
        if ! command -v jq&> /dev/null; then
          echo "jq not found, installing..."
          sudo apt-get update
          sudo apt-get install -y jq
        else
          echo "jq is already installed"
        fi


    - name: Fetch latest UBI9 micro image SHA
      id: fetch-sha
      run: |
        latest_sha=$(skopeo inspect docker://registry.access.redhat.com/ubi9/ubi-micro:latest | jq -r '.Digest')
        echo "latest_sha=$latest_sha" >> $GITHUB_ENV

    - name: Checkout target repository
      uses: actions/checkout@v4
      with:
        repository: panigs7/csm
        token: ${{ secrets.COMMON_GITHUB_ACTIONS_PAT }}
        path: csm-repo

    - name: Compare and update SHA in csm-common.mk
      id: update-sha
      run: |
        current_sha=$(grep 'UBI_BASEIMAGE=' csm-repo/config/csm-common.mk | cut -d'@' -f2)
        latest_sha=${{ env.latest_sha }}
        tag=$(skopeo inspect docker://registry.access.redhat.com/ubi9/ubi:latest | jq -r '.Labels.version')
        echo "tag=$tag" >> $GITHUB_ENV
        tag=$tag
        release=$(skopeo inspect docker://registry.access.redhat.com/ubi9/ubi:latest | jq -r '.Labels.release')
        echo "release=$release" >> $GITHUB_ENV
        release=${{ env.release }}

        if [ "$current_sha" != "$latest_sha" ]; then
          echo "SHA mismatch, updating..."
          sed -i "s|UBI_BASEIMAGE=.*|UBI_BASEIMAGE=registry.access.redhat.com/ubi9/ubi-micro@$latest_sha|" csm-repo/config/csm-common.mk
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          cd csm-repo
          git checkout -b update-ubi
          git add config/csm-common.mk
          git commit -m "Update UBI9 micro image SHA to $latest_sha"
          echo "This PR updates the UBI Image to ${{ env.tag }}-${{ env.release }}."
          git push origin update-ubi
        else
          echo "SHA is up-to-date"
        fi

